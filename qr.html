<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Scan · John Evans Portfolio</title>
<meta name="description" content="Point your camera at the future — John Evans' portfolio.">
<style>
  :root {
    --amber-glow: #FFB366;
    --amber-deep: #CC8844;
    --amber-core: #FFCC88;
    --cathode-cyan: #4DD9D9;
    --phosphor-green: #7FBF5F;
    --terminal-green: #4DFF88;
    --mint-glow: #7FD9A6;
    --cream: #F2E6D9;
    --peach-haze: #FFCCB3;
    --salmon: #FF9980;
    --night: #141019;
    --mono: "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--mono);
    background: var(--night);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* ── sky: dawn gradient of the optimistic future ── */
  .sky {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg,
      #141019 0%,
      #251b2e 30%,
      #4d3048 52%,
      #a05248 66%,
      var(--salmon) 74%,
      var(--peach-haze) 80%,
      var(--amber-core) 86%);
    z-index: -4;
  }

  /* the attractor — chaos is the new sun */
  #chaos {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: -3;
  }

  /* ── grid floor gliding toward the viewer ── */
  .floor {
    position: fixed;
    left: -25vw;
    right: -25vw;
    bottom: 0;
    height: 38vh;
    background-image:
      linear-gradient(to top, rgba(20,16,25,0) 0%, rgba(20,16,25,0.85) 96%),
      repeating-linear-gradient(90deg, var(--cathode-cyan) 0 2px, transparent 2px 72px),
      repeating-linear-gradient(0deg, var(--cathode-cyan) 0 2px, transparent 2px 46px);
    transform: perspective(420px) rotateX(62deg);
    transform-origin: 50% 100%;
    animation: glide 3.2s linear infinite;
    opacity: 0.5;
    z-index: -1;
  }
  @keyframes glide { from { background-position: 0 0, 0 0, 0 0; } to { background-position: 0 0, 0 0, 0 46px; } }

  /* ── the artifact ── */
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 24px;
    z-index: 1;
  }
  .kicker {
    color: var(--cream);
    font-size: clamp(11px, 2.6vw, 14px);
    letter-spacing: 0.42em;
    text-transform: uppercase;
    text-shadow: 0 0 12px rgba(255,179,102,0.8);
    text-align: center;
  }
  .kicker b { color: var(--terminal-green); font-weight: 700; text-shadow: 0 0 14px rgba(77,255,136,0.9); }

  .frame {
    position: relative;
    padding: 16px;
    background: linear-gradient(150deg, #241c17, #17120e);
    border: 2px solid var(--amber-deep);
    border-radius: 14px;
    box-shadow:
      0 0 0 4px rgba(26,20,16,0.9),
      0 0 44px rgba(255,179,102,0.45),
      0 0 120px rgba(77,217,217,0.25),
      inset 0 0 24px rgba(0,0,0,0.6);
    animation: breathe 6s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 0 4px rgba(26,20,16,0.9), 0 0 44px rgba(255,179,102,0.45), 0 0 120px rgba(77,217,217,0.25), inset 0 0 24px rgba(0,0,0,0.6); }
    50% { box-shadow: 0 0 0 4px rgba(26,20,16,0.9), 0 0 64px rgba(255,153,128,0.6), 0 0 150px rgba(127,191,95,0.35), inset 0 0 24px rgba(0,0,0,0.6); }
  }
  canvas#qr {
    display: block;
    width: min(58vmin, 380px);
    height: min(58vmin, 380px);
    image-rendering: pixelated;
    border-radius: 4px;
  }

  .tagline {
    color: var(--peach-haze);
    font-size: clamp(11px, 2.4vw, 13.5px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-align: center;
    text-shadow: 0 0 10px rgba(255,204,179,0.6);
    line-height: 2.2;
    background: rgba(20, 16, 25, 0.78);
    border: 1px solid rgba(204, 136, 68, 0.55);
    border-radius: 12px;
    padding: 14px 26px 16px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 0 30px rgba(20, 16, 25, 0.55);
  }
  .tagline .name {
    display: block;
    color: var(--cream);
    font-size: clamp(16px, 3.6vw, 24px);
    font-weight: 700;
    letter-spacing: 0.34em;
    text-shadow: 0 0 14px rgba(255,179,102,0.85), 0 0 34px rgba(255,153,128,0.4);
    margin-bottom: 2px;
  }
  .tagline a {
    color: var(--cathode-cyan);
    letter-spacing: 0.1em;
    text-transform: none;
    text-decoration: underline;
    text-decoration-thickness: 1.5px;
    text-underline-offset: 4px;
    text-shadow: 0 0 8px rgba(77,217,217,0.8), 0 0 18px rgba(77,217,217,0.35);
    transition: color 0.25s ease, text-shadow 0.25s ease;
  }
  .tagline a:hover, .tagline a:focus-visible {
    color: var(--terminal-green);
    text-shadow: 0 0 10px rgba(77,255,136,0.9), 0 0 22px rgba(77,255,136,0.45);
  }
  .tagline .sep { color: var(--amber-glow); }

  @media (prefers-reduced-motion: reduce) {
    .floor, .frame { animation: none; }
  }
</style>
</head>
<body>
  <div class="sky"></div>
  <canvas id="chaos"></canvas>
  <div class="floor"></div>

  <main class="stage">
    <div class="kicker">Point your camera<br>at the <b>future</b></div>
    <div class="frame"><canvas id="qr" width="450" height="450" role="img" aria-label="QR code linking to John Evans' portfolio"></canvas></div>
    <div class="tagline">
      <span class="name">John Evans</span>
      <a href="https://dot.cards/fabernovus" target="_blank" rel="noopener">dot.cards/fabernovus</a><br>
      <a href="mailto:jevans@ashfordbriggs.com">jevans@ashfordbriggs.com</a>
      <span class="sep">·</span>
      <a href="mailto:jevans@paladinrecruiter.com">jevans@paladinrecruiter.com</a><br>
      <a href="https://j-east.github.io/iframe-portfolio/">j-east.github.io/iframe-portfolio</a>
    </div>
  </main>

<script>
(function () {
  // ── the QR itself: plain, solid, maximally scannable ──────────
  // 37×37, ECC level H → https://j-east.github.io/iframe-portfolio/
  const ROWS = ["1111111010001110000100000000101111111","1000001011001100110100000001001000001","1011101011110110101101010011101011101","1011101001110101100111100111001011101","1011101001001010011001011100001011101","1000001010110100111000010111101000001","1111111010101010101010101010101111111","0000000010100100110101100010100000000","0011101011101111010100001100011100111","1010000001010001100111111100100100100","1110101010101000100101011111101010111","0011100010001111001001000011001100000","0100011111110010100010001110011010110","1011010000010100101110101100110101100","1101111011011110101100110001010111011","1000000001001011100011001000000110011","1100011110001010100101100111111010111","0111000010000010100000001110100001000","0111001000001000101111111011100000011","0110000010100101001010110011011100000","0001111010001001101001110110011110100","0001110101111101010100000100000101100","0011001000010010100011010111010000011","0110100100011100000110100010010100001","1000001000011000000000010000011011101","1110100001111011001100101100100101000","1001001010111110110101100101001001101","1000010011011011111100001001110100000","1010101110001000011111100100111110101","0000000011001001010111110000100010000","1111111000101101011111000010101011011","1000001000100011000010000010100010011","1011101011110001011111011111111110110","1011101010100101001011000001101011000","1011101011001001101000111010010000101","1000001000010000010110110011111110001","1111111001110111100000011100010110111"];
  const N = ROWS.length, QUIET = 3, TOTAL = N + QUIET * 2;
  const canvas = document.getElementById("qr");
  const ctx = canvas.getContext("2d");
  const CELL = Math.floor(canvas.width / TOTAL);
  const PAD = Math.floor((canvas.width - CELL * TOTAL) / 2);
  ctx.fillStyle = "#F2E6D9";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#17120C";
  for (let y = 0; y < N; y++)
    for (let x = 0; x < N; x++)
      if (ROWS[y][x] === "1")
        ctx.fillRect(PAD + (x + QUIET) * CELL, PAD + (y + QUIET) * CELL, CELL, CELL);
})();
</script>

<script type="module">
// ── chaos: a morphing Clifford attractor (lineage: j-east/ChaosRenders) ──
// x' = sin(a·y) + c·cos(a·x)
// y' = sin(b·x) + d·cos(b·y)
// The constants drift between curated parameter sets — the same trick
// ChaosRenders played with its newa/newb shift — so the form never
// settles. 90k particles ride the map on the GPU via three.js Points.
import * as THREE from "https://unpkg.com/three@0.170.0/build/three.module.js";

const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
const canvas = document.getElementById("chaos");
let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
} catch (e) { canvas.remove(); throw e; }   // no WebGL → dawn sky stands alone
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
camera.position.z = 2;

const COUNT = reduced ? 45000 : 90000;
const positions = new Float32Array(COUNT * 3);
const colors = new Float32Array(COUNT * 3);
const px = new Float32Array(COUNT);
const py = new Float32Array(COUNT);
for (let i = 0; i < COUNT; i++) { px[i] = Math.random() * 4 - 2; py[i] = Math.random() * 4 - 2; }

const geometry = new THREE.BufferGeometry();
geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
const material = new THREE.PointsMaterial({
  size: 1.4 * Math.min(devicePixelRatio, 2),
  vertexColors: true,
  transparent: true,
  opacity: 0.42,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: false,
});
scene.add(new THREE.Points(geometry, material));

// palette (the site's own) as vec3s
const PALETTE = [
  [1.0, 0.70, 0.40],   // amber glow
  [1.0, 0.60, 0.50],   // salmon
  [0.50, 0.85, 0.85],  // cathode cyan
  [0.50, 1.0, 0.53],   // terminal green
  [1.0, 0.80, 0.70],   // peach haze
];
function pal(t) {
  t = ((t % 1) + 1) % 1;
  const f = t * PALETTE.length;
  const i = Math.floor(f) % PALETTE.length, j = (i + 1) % PALETTE.length, k = f - Math.floor(f);
  return [
    PALETTE[i][0] + (PALETTE[j][0] - PALETTE[i][0]) * k,
    PALETTE[i][1] + (PALETTE[j][1] - PALETTE[i][1]) * k,
    PALETTE[i][2] + (PALETTE[j][2] - PALETTE[i][2]) * k,
  ];
}

// curated Clifford parameter cycle — ChaosRenders' own set leads.
// Every consecutive transition was machine-checked to stay chaotic at
// 25/50/75% parameter blends (spread > 0.55), so the morph never
// collapses into a fixed point mid-flight.
const SETS = [
  [-1.7, 1.8, -0.9, -0.4],
  [-1.4, 1.6, 1.0, 0.7],
  [-1.7, 1.3, -0.1, -1.2],
  [-1.8, 1.9, -0.7, -0.5],
  [-2.0, -2.0, -1.2, 2.0],
];
let setIdx = 0;
let cur = SETS[0].slice();
let target = SETS[1].slice();
let morph = 0;
const MORPH_SECONDS = 14;

let viewAspect = 1;
function resize() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h, false);
  viewAspect = w / h;
  camera.left = -viewAspect; camera.right = viewAspect;
  camera.updateProjectionMatrix();
}
addEventListener("resize", resize);
resize();

const clock = new THREE.Clock();
let hue = 0;

function stepParticles(a, b, c, d, t) {
  for (let i = 0; i < COUNT; i++) {
    let x = px[i], y = py[i];
    // safety net: a trickle of respawns keeps transitional regimes
    // luminous instead of letting everything pool into one point
    if (Math.random() < 0.004) { x = Math.random() * 4 - 2; y = Math.random() * 4 - 2; }
    const nx = Math.sin(a * y) + c * Math.cos(a * x) + (Math.random() - 0.5) * 0.004;
    const ny = Math.sin(b * x) + d * Math.cos(b * y) + (Math.random() - 0.5) * 0.004;
    px[i] = nx; py[i] = ny;
    const o = i * 3;
    // sweep the whole sky — the QR panel floats inside the chaos,
    // filaments spilling out on every side
    positions[o] = nx * viewAspect * 0.62;
    positions[o + 1] = ny * 0.62;
    positions[o + 2] = 0;
    // color by where the particle sits on the form + slow global drift
    const col = pal(Math.atan2(ny, nx) / (Math.PI * 2) + hue);
    colors[o] = col[0]; colors[o + 1] = col[1]; colors[o + 2] = col[2];
  }
  geometry.attributes.position.needsUpdate = true;
  geometry.attributes.color.needsUpdate = true;
}

function frame() {
  const dt = Math.min(clock.getDelta(), 0.1);
  hue += dt * 0.012;
  morph += dt / MORPH_SECONDS;
  if (morph >= 1) {
    morph = 0;
    setIdx = (setIdx + 1) % SETS.length;
    cur = target;
    target = SETS[(setIdx + 1) % SETS.length].slice();
  }
  // smoothstep between parameter sets — forms melt into one another
  const s = morph * morph * (3 - 2 * morph);
  const a = cur[0] + (target[0] - cur[0]) * s;
  const b = cur[1] + (target[1] - cur[1]) * s;
  const c = cur[2] + (target[2] - cur[2]) * s;
  const d = cur[3] + (target[3] - cur[3]) * s;
  stepParticles(a, b, c, d);
  renderer.render(scene, camera);
}

if (reduced) {
  // settle onto ChaosRenders' home form and hold it
  for (let k = 0; k < 20; k++) stepParticles(...SETS[0]);
  renderer.render(scene, camera);
} else {
  renderer.setAnimationLoop(frame);
}
</script>
</body>
</html>
